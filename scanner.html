<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Scanner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Attendance Scanner</h1>

  <div id="reader"></div>
  
  <p id="scanStatus" class="status-label"></p>

  <button id="scanButton" class="btn">
    Scan QR
  </button>
  <button id="switchCamera" class="btn">
    Switch Camera
  </button>
  
  <button id="clearData" class="btn" style="background: #f44336;">
    Clear Records
  </button>

  <h2>Attendance Records</h2>

  <table>
    <thead>
      <tr>
        <th>Student</th>
        <th>Date</th>
        <th>Time</th>
      </tr>
    </thead>
    <tbody id="attendanceTable"></tbody>
  </table>
</div>

<script src="scanner.js"></script>

</body>
</html>
