<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Generate Student QR</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f5f5f5;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .container{
      background:white;
      padding:30px;
      border-radius:15px;
      text-align:center;
      box-shadow:0 0 15px rgba(0,0,0,0.1);
      width:350px;
    }

    input{
      width:100%;
      padding:12px;
      margin-bottom:15px;
      border-radius:8px;
      border:1px solid #ccc;
      font-size:16px;
      box-sizing:border-box;
    }

    .btn{
      padding:12px 20px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-size:16px;
      margin:5px;
    }

    .generate-btn{
      background:#007bff;
      color:white;
    }

    .download-btn{
      background:#28a745;
      color:white;
      display:none;
    }

    #qrContainer{
      margin-top:20px;
      background:white;
      padding:20px;
      border-radius:10px;
      display:inline-block;
    }

    #studentDisplayName{
      margin-top:15px;
      font-size:22px;
      font-weight:bold;
      color:#222;
      word-break:break-word;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Student QR Generator</h1>

  <input type="text" id="studentName" placeholder="Enter student name">

  <button class="btn generate-btn" onclick="generateQR()">
    Generate QR
  </button>

  <button class="btn download-btn" id="downloadBtn" onclick="downloadQR()">
    Download QR
  </button>

  <div id="qrContainer">
    <div id="qrcode"></div>
    <div id="studentDisplayName"></div>
  </div>
</div>

<script>
function generateQR() {

  const name = document.getElementById('studentName').value.trim();

  if(name === ""){
    alert("Please enter student name");
    return;
  }

  document.getElementById('qrcode').innerHTML = "";
  document.getElementById('studentDisplayName').innerText = name;

  new QRCode(document.getElementById('qrcode'), {
    text: name,
    width: 250,
    height: 250
  });

  document.getElementById('downloadBtn').style.display = "inline-block";
}

function downloadQR() {

  const qrCanvas = document.querySelector("#qrcode canvas");
  const studentName = document.getElementById("studentDisplayName").innerText;

  if(!qrCanvas){
    alert("Generate QR first");
    return;
  }

  const finalCanvas = document.createElement("canvas");
  const ctx = finalCanvas.getContext("2d");

  finalCanvas.width = 300;
  finalCanvas.height = 380;

  // White background
  ctx.fillStyle = "white";
  ctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);

  // Draw QR
  ctx.drawImage(qrCanvas, 25, 20, 250, 250);

  // Draw Name
  ctx.fillStyle = "black";
  ctx.font = "bold 24px Arial";
  ctx.textAlign = "center";
  ctx.fillText(studentName, finalCanvas.width / 2, 320);

  // Download image
  const link = document.createElement("a");
  link.download = studentName + "_QR.png";
  link.href = finalCanvas.toDataURL("image/png");
  link.click();
}
</script>

</body>
</html>
